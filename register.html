<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Example</title>
</head>
<body>
    <h1>Firebase User Registration</h1>
    
    <form id="register-form">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Register</button>
    </form>

    <div id="error-message"></div>

    <script type="module">
        import { registerUser } from './firebase.js';

        // จับเหตุการณ์การส่งฟอร์ม
        document.getElementById('register-form').addEventListener('submit', function(event) {
            event.preventDefault(); // หยุดการส่งฟอร์มแบบธรรมดา

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // ตรวจสอบว่ามีการกรอกข้อมูลในฟอร์มหรือไม่
            if (email && password) {
                registerUser(email, password);
            } else {
                document.getElementById('error-message').textContent = "Please fill out both fields!";
            }
        });
    </script>
</body>
</html>
