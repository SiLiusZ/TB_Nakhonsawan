<form action="#" method="post" id="login-form">
    <label for="username">Username:</label>
    <input type="text" id="username" name="username" required>

    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required>

    <button type="submit">Login</button>
</form>

<script>
    // Example login validation
    const form = document.getElementById('login-form');
    form.addEventListener('submit', function(event) {
        event.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        // Check the user credentials (Here using a mock check with localStorage)
        if(localStorage.getItem('username') === username && localStorage.getItem('password') === password) {
            const userLevel = localStorage.getItem('user-level');
            
            // Store user level in localStorage for later use
            localStorage.setItem('user-level', userLevel);

            alert('Login successful!');
            window.location.href = 'dashboard.html'; // Redirect to dashboard
        } else {
            alert('Invalid login credentials');
        }
    });
</script>
